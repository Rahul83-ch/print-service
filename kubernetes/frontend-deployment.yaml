apiVersion: apps/v1
kind: Deployment
metadata:
  name: printer-portal-frontend
  namespace: universal-print
  labels:
    app: printer-portal-frontend
    tier: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: printer-portal-frontend
  template:
    metadata:
      labels:
        app: printer-portal-frontend
    spec:
      containers:
        - name: frontend
          image: registry-local.flextronassembly.net/q2c/print-portal-frontend:0.0.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
      imagePullSecrets:
        - name: harbor-auth